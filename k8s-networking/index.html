<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubeNet Master: Advanced Networking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .packet {
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }
        .node-boundary {
            border: 2px dashed #475569;
            transition: border-color 0.3s, background-color 0.3s;
        }
        .node-active {
            border-color: #3b82f6;
            background-color: rgba(30, 41, 59, 0.5);
        }
        .tool-btn {
            transition: all 0.2s ease;
        }
        .tool-correct {
            background-color: #16a34a !important;
            border-color: #22c55e !important;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }
        .tool-wrong {
            background-color: #dc2626 !important;
            border-color: #f87171 !important;
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .hint-content {
            display: none;
        }
        .hint-content.show {
            display: block;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col">

    <header class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center shadow-lg">
        <div>
            <h1 class="text-2xl font-bold text-blue-400">KubeNet Master 🌐</h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest">Advanced Network Simulation</p>
        </div>
        <div class="flex gap-6">
            <div class="text-center">
                <p class="text-[10px] uppercase text-slate-500">Màn chơi</p>
                <p id="level-display" class="font-mono text-xl text-yellow-500">1/5</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] uppercase text-slate-500">Độ ổn định</p>
                <p id="health-display" class="font-mono text-xl text-green-500">100%</p>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-96 bg-slate-800 p-6 border-r border-slate-700 flex flex-col gap-6 overflow-y-auto">
            <div id="mission-box" class="bg-slate-900/50 p-4 rounded-lg border border-blue-500/30">
                <h2 id="level-title" class="text-lg font-bold mb-2 text-blue-300">...</h2>
                <p id="mission-text" class="text-sm text-slate-300 leading-relaxed mb-4">...</p>
                
                <div id="hint-section">
                    <button onclick="toggleHint()" class="text-xs text-yellow-500 hover:text-yellow-400 flex items-center gap-1 font-bold underline">
                        💡 Cần gợi ý?
                    </button>
                    <div id="hint-text" class="hint-content mt-2 p-3 bg-yellow-900/20 border border-yellow-700/50 rounded text-xs text-yellow-200 leading-normal italic"></div>
                </div>
            </div>

            <div class="pt-2">
                <h3 class="text-xs font-bold text-slate-500 mb-3 uppercase tracking-tighter">Công cụ điều phối</h3>
                <div id="tools-grid" class="grid grid-cols-1 gap-3">
                    <button id="btn-veth" onclick="handleToolClick('veth')" class="tool-btn bg-slate-700 hover:bg-slate-600 p-3 rounded text-left text-sm flex items-center justify-between">
                        <span>Gắn Virtual Ethernet (veth)</span>
                        <span class="text-[10px] bg-slate-900 px-1 rounded">L2</span>
                    </button>
                    <button id="btn-bridge" onclick="handleToolClick('bridge')" class="tool-btn bg-slate-700 hover:bg-slate-600 p-3 rounded text-left text-sm flex items-center justify-between">
                        <span>Cấu hình Bridge (cbr0)</span>
                        <span class="text-[10px] bg-slate-900 px-1 rounded">Switch</span>
                    </button>
                    <button id="btn-overlay" onclick="handleToolClick('overlay')" class="tool-btn bg-slate-700 hover:bg-slate-600 p-3 rounded text-left text-sm flex items-center justify-between">
                        <span>Kích hoạt VXLAN Overlay</span>
                        <span class="text-[10px] bg-slate-900 px-1 rounded">Tunnel</span>
                    </button>
                    <button id="btn-iptables" onclick="handleToolClick('iptables')" class="tool-btn bg-slate-700 hover:bg-slate-600 p-3 rounded text-left text-sm flex items-center justify-between">
                        <span>Iptables DNAT (Service)</span>
                        <span class="text-[10px] bg-slate-900 px-1 rounded">NAT</span>
                    </button>
                    <button id="btn-nodeport" onclick="handleToolClick('nodeport')" class="tool-btn bg-slate-700 hover:bg-slate-600 p-3 rounded text-left text-sm flex items-center justify-between">
                        <span>Mở NodePort (External)</span>
                        <span class="text-[10px] bg-slate-900 px-1 rounded">Ingress</span>
                    </button>
                    <button id="btn-policy" onclick="handleToolClick('policy')" class="tool-btn bg-slate-700 hover:bg-slate-600 p-3 rounded text-left text-sm flex items-center justify-between">
                        <span>Áp dụng Network Policy</span>
                        <span class="text-[10px] bg-slate-900 px-1 rounded">Firewall</span>
                    </button>
                </div>
            </div>

            <div id="feedback" class="mt-auto p-4 bg-slate-900 rounded-lg border border-slate-700 text-sm text-blue-400 min-h-[60px] flex items-center shadow-inner italic">
                Khởi động console...
            </div>
        </aside>

        <!-- Game Canvas -->
        <div id="canvas-container" class="flex-1 relative bg-slate-950 p-8 overflow-hidden">
            <div class="absolute inset-0" style="background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; opacity: 0.3;"></div>

            <!-- Node 1 -->
            <div id="node-1" class="node-boundary absolute top-10 left-10 w-[42%] h-[85%] rounded-2xl p-6 shadow-2xl bg-slate-900/20">
                <span class="absolute -top-3 left-6 bg-slate-950 px-3 text-slate-400 text-xs font-mono font-bold border border-slate-700 rounded-full">NODE-01</span>
                
                <div id="pod-a" class="pod absolute top-10 left-10 w-24 h-24 bg-blue-600/10 border-2 border-blue-500 rounded-xl flex flex-col items-center justify-center transition-transform hover:scale-105">
                    <span class="text-[10px] font-bold text-blue-400">POD-A</span>
                    <span class="text-[8px] text-slate-500">10.244.1.2</span>
                </div>

                <div id="pod-b" class="pod absolute bottom-10 left-10 w-24 h-24 bg-blue-600/10 border-2 border-blue-500 rounded-xl flex flex-col items-center justify-center transition-transform hover:scale-105">
                    <span class="text-[10px] font-bold text-blue-400">POD-B</span>
                    <span class="text-[8px] text-slate-500">10.244.1.3</span>
                </div>

                <div id="bridge-1" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-slate-800 border-2 border-slate-600 rounded-full flex flex-col items-center justify-center opacity-20">
                    <span class="text-[8px] text-slate-400 font-bold">CBR0</span>
                </div>
            </div>

            <!-- Node 2 -->
            <div id="node-2" class="node-boundary absolute top-10 right-10 w-[42%] h-[85%] rounded-2xl p-6 shadow-2xl bg-slate-900/20">
                <span class="absolute -top-3 left-6 bg-slate-950 px-3 text-slate-400 text-xs font-mono font-bold border border-slate-700 rounded-full">NODE-02</span>
                
                <div id="pod-c" class="pod absolute top-10 right-10 w-24 h-24 bg-purple-600/10 border-2 border-purple-500 rounded-xl flex flex-col items-center justify-center transition-transform hover:scale-105">
                    <span class="text-[10px] font-bold text-purple-400">POD-C</span>
                    <span class="text-[8px] text-slate-500">10.244.2.5</span>
                </div>

                <div id="service-lb" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 bg-yellow-900/10 border-2 border-yellow-500 border-dashed rounded-xl hidden flex flex-col items-center justify-center">
                    <span class="text-[8px] text-yellow-500 font-bold uppercase text-center">SVC IP<br>10.96.0.1</span>
                </div>
            </div>

            <!-- Packet -->
            <div id="packet" class="packet absolute w-4 h-4 bg-yellow-400 rounded-full hidden shadow-[0_0_15px_#facc15] flex items-center justify-center">
                <div class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></div>
            </div>
        </div>
    </main>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[100] p-4 backdrop-blur-md">
        <div class="bg-slate-800 border-2 border-blue-500 p-8 rounded-3xl max-w-3xl w-full shadow-2xl overflow-y-auto max-h-[95vh] fade-in">
            <div class="flex items-center gap-4 mb-6">
                <div class="bg-green-500/20 p-3 rounded-full">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-white tracking-tight">KẾT QUẢ CHÍNH XÁC</h2>
            </div>
            
            <div class="grid md:grid-cols-2 gap-8 mb-8">
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Phân tích chuyên sâu:</h3>
                    <p id="modal-explanation" class="text-slate-200 text-sm leading-relaxed bg-slate-900/50 p-4 rounded-xl border border-slate-700"></p>
                </div>
                <div>
                    <h3 class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-3">Mô phỏng cấu trúc:</h3>
                    <div id="modal-visual" class="bg-slate-950 rounded-xl p-2 border border-slate-700 min-h-[200px] flex items-center justify-center"></div>
                </div>
            </div>

            <button id="next-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg transition-all shadow-xl shadow-blue-500/20 active:scale-95">
                TIẾP TỤC NHIỆM VỤ
            </button>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let health = 100;
        let activeSteps = [];
        let isTrafficRunning = false;

        const levels = [
            {
                title: "1. Intra-Node Communication",
                mission: "Pod-A muốn 'nói chuyện' với Pod-B trên cùng máy chủ. Hãy thiết lập hạ tầng mạng cơ bản nhất tại lớp 2 (Data Link) để chúng thấy nhau.",
                hint: "Sử dụng veth để tạo cổng nối và Bridge làm bộ chuyển mạch ảo nội bộ.",
                targetSteps: ['veth', 'bridge'],
                start: 'pod-a',
                path: ['bridge-1', 'pod-b'],
                explanation: "Trên cùng một Node, K8s tạo ra cặp veth. Một đầu nằm trong Pod, đầu kia gắn vào Bridge (cbr0). Khi Pod-A gửi gói tin đến IP Pod-B, Bridge sẽ broadcast ARP và chuyển tiếp gói tin dựa trên địa chỉ MAC ảo.",
                visual: `
                    <svg viewBox="0 0 400 150" class="w-full h-full">
                        <rect x="50" y="20" width="70" height="30" rx="4" fill="#1e3a8a" stroke="#3b82f6"/>
                        <rect x="280" y="20" width="70" height="30" rx="4" fill="#1e3a8a" stroke="#3b82f6"/>
                        <circle cx="200" cy="110" r="20" fill="#334155" stroke="#94a3b8"/>
                        <path d="M85 50 L185 100 M215 100 L315 50" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4"/>
                        <text x="200" y="115" fill="white" font-size="8" text-anchor="middle">L2 SWITCH</text>
                    </svg>`
            },
            {
                title: "2. Cross-Node Overlay",
                mission: "Pod-A cần gửi dữ liệu sang Pod-C ở Node-02. Dải mạng vật lý của Node không hiểu địa chỉ IP nội bộ của Pod (10.244.x).",
                hint: "Overlay (VXLAN) giúp 'đóng gói' gói tin của Pod vào bên trong gói tin của Node để đi xuyên qua mạng vật lý.",
                targetSteps: ['overlay'],
                start: 'pod-a',
                path: ['bridge-1', 'node-1-edge', 'node-2-edge', 'pod-c'],
                explanation: "VXLAN tạo ra một Layer 2 ảo trên nền Layer 3. Gói tin Pod được bọc thêm Header UDP của Node. Khi sang Node bên kia, Flannel/Calico sẽ mở lớp bọc này ra để lấy gói tin gốc.",
                visual: `
                    <svg viewBox="0 0 400 150" class="w-full h-full">
                        <rect x="30" y="40" width="100" height="60" rx="5" fill="#0f172a" stroke="#475569" stroke-dasharray="4"/>
                        <rect x="270" y="40" width="100" height="60" rx="5" fill="#0f172a" stroke="#475569" stroke-dasharray="4"/>
                        <path d="M130 70 C 200 20, 200 120, 270 70" stroke="#a855f7" stroke-width="3" fill="none"/>
                        <text x="200" y="130" fill="#d8b4fe" font-size="10" text-anchor="middle">TUNNEL VXLAN</text>
                    </svg>`
            },
            {
                title: "3. Cluster Service Proxy",
                mission: "Người dùng truy cập qua Service ClusterIP (10.96.0.1). Hãy điều phối gói tin này đến đúng Pod-C đang chạy.",
                hint: "Iptables DNAT sẽ thay đổi 'Destination IP' từ IP ảo của Service thành IP thực của Pod.",
                targetSteps: ['iptables'],
                start: 'node-1-edge',
                path: ['service-lb', 'pod-c'],
                explanation: "Kube-proxy quản lý các luật NAT. Khi gói tin chạm vào Kernel, Iptables/IPVS sẽ chọn ngẫu nhiên (hoặc theo thuật toán) một Pod Backend và thay đổi địa chỉ đích của gói tin ngay lập tức.",
                visual: `
                    <svg viewBox="0 0 400 150" class="w-full h-full">
                        <text x="50" y="75" fill="#eab308" font-size="10">Dest: SVC IP</text>
                        <rect x="150" y="55" width="100" height="40" rx="8" fill="#422006" stroke="#eab308"/>
                        <text x="200" y="80" fill="white" font-size="9" text-anchor="middle">DNAT RULES</text>
                        <path d="M250 75 L300 75" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
                        <text x="350" y="75" fill="#22c55e" font-size="10" text-anchor="middle">Real Pod IP</text>
                    </svg>`
            },
            {
                title: "4. External Access (NodePort)",
                mission: "Một Client từ Internet muốn truy cập vào ứng dụng. Họ chỉ biết IP của máy chủ (Node-02) và một cổng đặc biệt (30001).",
                hint: "NodePort mở một cổng trên tất cả các Node để đón traffic từ bên ngoài vào hệ thống mạng nội bộ.",
                targetSteps: ['nodeport', 'iptables'],
                start: 'external',
                path: ['node-2-edge', 'service-lb', 'pod-c'],
                explanation: "NodePort là cách đơn giản nhất để tiếp nhận traffic ngoại. Nó lắng nghe trên port 30000-32767 trên IP vật lý của Node, sau đó chuyển traffic đó vào ClusterIP Service tương ứng.",
                visual: `
                    <svg viewBox="0 0 400 150" class="w-full h-full">
                        <circle cx="50" cy="75" r="20" fill="#1e293b" stroke="#3b82f6"/>
                        <text x="50" y="110" fill="white" font-size="8" text-anchor="middle">EXTERNAL CLIENT</text>
                        <path d="M70 75 L270 75" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5"/>
                        <rect x="270" y="50" width="80" height="50" rx="4" fill="#1e3a8a" stroke="#60a5fa"/>
                        <text x="310" y="80" fill="white" font-size="8" text-anchor="middle">NODE PORT</text>
                    </svg>`
            },
            {
                title: "5. Security Policy",
                mission: "Hệ thống đang bị tấn công! Pod-A không được phép gửi dữ liệu trực tiếp đến Pod-C. Hãy thiết lập rào chắn bảo vệ.",
                hint: "Network Policy hoạt động như một Firewall ở mức Pod, cho phép hoặc chặn traffic dựa trên nhãn (labels).",
                targetSteps: ['policy'],
                start: 'pod-a',
                path: ['bridge-1', 'blocked'],
                explanation: "Network Policy thường được thực thi bởi CNI (như Calico hay Cilium) thông qua BPF hoặc Iptables. Nó cung cấp bảo mật 'Zero Trust', mặc định chặn tất cả nếu không được phép rõ ràng.",
                visual: `
                    <svg viewBox="0 0 400 150" class="w-full h-full">
                        <rect x="50" y="60" width="60" height="30" rx="4" fill="#1e3a8a"/>
                        <rect x="290" y="60" width="60" height="30" rx="4" fill="#1e3a8a"/>
                        <line x1="200" y1="30" x2="200" y2="120" stroke="#ef4444" stroke-width="4" stroke-dasharray="8"/>
                        <text x="200" y="20" fill="#ef4444" font-size="10" text-anchor="middle">DENY POLICY</text>
                    </svg>`
            }
        ];

        function toggleHint() {
            document.getElementById('hint-text').classList.toggle('show');
        }

        function logFeedback(msg, type = 'info') {
            const fb = document.getElementById('feedback');
            fb.innerText = msg;
            if (type === 'error') {
                fb.className = "mt-auto p-4 bg-red-900/20 rounded-lg border border-red-700/50 text-sm text-red-400 min-h-[60px] flex items-center shadow-inner";
            } else if (type === 'success') {
                fb.className = "mt-auto p-4 bg-green-900/20 rounded-lg border border-green-700/50 text-sm text-green-400 min-h-[60px] flex items-center shadow-inner font-bold";
            } else {
                fb.className = "mt-auto p-4 bg-slate-900 rounded-lg border border-slate-700 text-sm text-blue-400 min-h-[60px] flex items-center shadow-inner";
            }
        }

        function handleToolClick(step) {
            if (isTrafficRunning) return;
            const level = levels[currentLevel - 1];
            const btn = document.getElementById(`btn-${step}`);

            if (level.targetSteps.includes(step)) {
                if (!activeSteps.includes(step)) {
                    activeSteps.push(step);
                    btn.classList.add('tool-correct');
                    logFeedback(`[Hệ thống] Đã cấu hình thành công: ${step.toUpperCase()}`, 'success');
                    visualizeStep(step);
                    if (activeSteps.length === level.targetSteps.length) runTraffic();
                }
            } else {
                btn.classList.add('tool-wrong');
                health -= 10;
                updateStats();
                logFeedback(`[Cảnh báo] ${step.toUpperCase()} không phù hợp trong kịch bản này!`, 'error');
                setTimeout(() => btn.classList.remove('tool-wrong'), 500);
            }
        }

        function visualizeStep(step) {
            if (step === 'bridge') document.getElementById('bridge-1').style.opacity = '1';
            if (step === 'iptables') document.getElementById('service-lb').classList.remove('hidden');
            if (step === 'overlay') {
                document.getElementById('node-1').classList.add('node-active');
                document.getElementById('node-2').classList.add('node-active');
            }
            if (step === 'policy') {
                document.getElementById('node-2').style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                document.getElementById('node-2').style.borderColor = '#ef4444';
            }
        }

        function updateStats() {
            document.getElementById('level-display').innerText = `${currentLevel}/${levels.length}`;
            document.getElementById('health-display').innerText = `${health}%`;
            if (health <= 0) { alert("Hệ thống mạng sụp đổ! Resetting..."); location.reload(); }
        }

        function getPointCoordinates(pointId, containerRect) {
            if (pointId === 'external') return { x: -20, y: containerRect.height / 2 };
            if (pointId === 'node-1-edge') return { x: containerRect.width * 0.44, y: containerRect.height / 2 };
            if (pointId === 'node-2-edge') return { x: containerRect.width * 0.56, y: containerRect.height / 2 };
            if (pointId === 'blocked') return { x: containerRect.width * 0.5, y: containerRect.height / 2 };
            
            const el = document.getElementById(pointId);
            if (!el) return { x: 0, y: 0 };
            const rect = el.getBoundingClientRect();
            return {
                x: rect.left - containerRect.left + rect.width / 2,
                y: rect.top - containerRect.top + rect.height / 2
            };
        }

        function runTraffic() {
            isTrafficRunning = true;
            const level = levels[currentLevel - 1];
            const packet = document.getElementById('packet');
            const containerRect = document.getElementById('canvas-container').getBoundingClientRect();
            
            const startCoords = getPointCoordinates(level.start, containerRect);
            packet.style.left = `${startCoords.x}px`;
            packet.style.top = `${startCoords.y}px`;
            packet.classList.remove('hidden');

            level.path.forEach((pointId, index) => {
                setTimeout(() => {
                    const coords = getPointCoordinates(pointId, containerRect);
                    packet.style.left = `${coords.x}px`;
                    packet.style.top = `${coords.y}px`;

                    if (pointId === 'blocked') {
                        setTimeout(() => {
                            packet.style.backgroundColor = '#ef4444';
                            logFeedback("[Firewall] Traffic bị chặn bởi Network Policy!", 'error');
                            setTimeout(showSuccessModal, 800);
                        }, 400);
                    } else if (index === level.path.length - 1) {
                        setTimeout(() => {
                            logFeedback("[Thành công] Luồng dữ liệu đã được thông suốt!");
                            showSuccessModal();
                        }, 800);
                    }
                }, (index + 1) * 800);
            });
        }

        function showSuccessModal() {
            const level = levels[currentLevel - 1];
            const modal = document.getElementById('success-modal');
            document.getElementById('modal-explanation').innerText = level.explanation;
            document.getElementById('modal-visual').innerHTML = level.visual;
            modal.style.display = 'flex';
            
            document.getElementById('next-btn').onclick = () => {
                modal.style.display = 'none';
                currentLevel++;
                if (currentLevel > levels.length) {
                    alert("CHÚC MỪNG! BẠN ĐÃ LÀ BẬC THẦY KUBERNETES NETWORKING!");
                    location.reload();
                } else {
                    resetBoard();
                }
            };
        }

        function resetBoard() {
            activeSteps = [];
            isTrafficRunning = false;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('tool-correct', 'tool-wrong'));
            document.getElementById('packet').classList.add('hidden');
            document.getElementById('packet').style.backgroundColor = '#facc15';
            document.getElementById('bridge-1').style.opacity = '0.2';
            document.getElementById('service-lb').classList.add('hidden');
            document.getElementById('node-1').classList.remove('node-active');
            document.getElementById('node-2').classList.remove('node-active');
            document.getElementById('node-2').style.borderColor = '#475569';
            document.getElementById('node-2').style.backgroundColor = 'transparent';
            document.getElementById('hint-text').classList.remove('show');
            
            const level = levels[currentLevel - 1];
            document.getElementById('level-title').innerText = level.title;
            document.getElementById('mission-text').innerText = level.mission;
            document.getElementById('hint-text').innerText = level.hint;
            updateStats();
            logFeedback("Sẵn sàng nhận cấu hình mới...");
        }

        window.onload = resetBoard;
    </script>
</body>
</html>
